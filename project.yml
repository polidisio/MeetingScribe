name: MeetingScribe
options:
  bundleIdPrefix: com.saraiba
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: MeetingScribe
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  MeetingScribe:
    type: application
    platform: macOS
    sources:
      - path: MeetingScribe
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
    settings:
      base:
        INFOPLIST_FILE: MeetingScribe/Info.plist
        CODE_SIGN_ENTITLEMENTS: MeetingScribe/MeetingScribe.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: com.saraiba.meetingscribe
    entitlements:
      path: MeetingScribe/MeetingScribe.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true

schemes:
  MeetingScribe:
    build:
      targets:
        MeetingScribe: all
    run:
      config: Debug